services:
  db:
    image: postgres:17
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: core
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 30s
      retries: 3

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      CORE_DB_CONNSTRING: "postgres://postgres:postgres@db:5432/core?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
