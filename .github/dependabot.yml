version: 2
updates:
  # Pinned GitHub Actions SHAs (ci.yml, release.yml, codeql.yml).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    groups:
      actions:
        patterns: ["*"]

  # Go module dependencies.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    groups:
      go-modules:
        patterns: ["*"]

  # Base image digests in Dockerfile.core and Dockerfile.migrate
  # (the golang builder and distroless runtime FROM lines).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
