name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Shared Go CI (lint, build+vet, test, govulncheck, integration) lives in the
  # org .github repo so every Go service doesn't re-implement it.
  go-ci:
    uses: fair-n-square-co/.github/.github/workflows/go-ci.yml@main
    with:
      run-integration: true
      integration-packages: ./cmd/core/...

  # Core-specific: sqlc + mocks must be regenerated and committed (not shared).
  generate:
    name: Generated code up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install sqlc
        # Keep in sync with the sqlc version in .tool-versions.
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0

      - name: Regenerate sqlc + mocks
        run: |
          sqlc generate
          go generate ./...

      - name: Verify no changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated code is stale. Run 'just generate' and commit the result."
            exit 1
          fi
