name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "22 9 * * 2"

permissions:
  contents: read

jobs:
  # CodeQL (Go + Actions) is the org reusable workflow; it pins the codeql-action
  # to a SHA and declares the analysis permissions, granted by this job below.
  codeql:
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    uses: fair-n-square-co/.github/.github/workflows/codeql.yml@c1e2693bc3c5164d2df3c6c3b6ebd5738f3a0c74 # main
