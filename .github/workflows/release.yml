name: Release images

# Builds and publishes both container images to GHCR:
#   ghcr.io/fair-n-square-co/core           (the service)      <- Dockerfile.core
#   ghcr.io/fair-n-square-co/core/migrate   (goose runner)     <- Dockerfile.migrate
#
# Triggers:
#   - push to main      -> :edge and :sha-<short> (unsigned-on-main is fine; these are dev builds)
#   - push tag v*       -> :X.Y.Z, :X.Y, :latest (semver releases)
#
# Supply-chain controls per image: SBOM + SLSA build provenance (buildx),
# Trivy HIGH/CRITICAL gate, cosign keyless signature, and a GitHub-native
# build-provenance attestation. All images and bases are digest-pinned.

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build & publish (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read        # checkout
      packages: write       # push images to GHCR
      id-token: write       # OIDC for cosign keyless + provenance attestation
      attestations: write   # actions/attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: core
            dockerfile: Dockerfile.core
            repo: ghcr.io/fair-n-square-co/core
          - name: migrate
            dockerfile: Dockerfile.migrate
            repo: ghcr.io/fair-n-square-co/core/migrate
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ matrix.image.repo }}
          # latest=auto -> 'latest' is attached only to the highest semver tag,
          # never to main builds.
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate: fail the job (before signing) on fixable HIGH/CRITICAL vulns.
      # Scans the exact pushed digest. A failure here leaves the image pushed
      # but UNSIGNED, so signature-verifying deploys will refuse it.
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image.repo }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless)
        run: cosign sign --yes "${{ matrix.image.repo }}@${{ steps.build.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ matrix.image.repo }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
