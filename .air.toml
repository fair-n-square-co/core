# Hot-reload config for local dev (`just run`).
# https://github.com/air-verse/air
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/core ./cmd/core"
  bin = "./tmp/core"
  include_ext = ["go"]
  exclude_dir = ["bin", "tmp", ".tmp", "db", "internal/core/db/sqlc/mocks"]
  exclude_regex = ["_test.go"]
  stop_on_error = true
  delay = 200

[misc]
  clean_on_exit = true
